<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday Nana 🎂</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: url("HERPIC.jpeg") no-repeat center center/cover;
}

.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.65);
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  text-align: center;
}

.popup {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(12px);
  padding: 40px;
  border-radius: 20px;
  animation: fadeIn 1s ease;
}

button {
  margin-top: 20px;
  padding: 12px 30px;
  border: none;
  border-radius: 10px;
  background: #ff4da6;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

img {
  width: 250px;
  border-radius: 15px;
  margin-top: 20px;
}

@keyframes fadeIn {
  from {opacity: 0; transform: scale(0.8);}
  to {opacity: 1; transform: scale(1);}
}
</style>
</head>
<body>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="overlay">
  <div class="popup" id="content">
    <h1>Hey Nana 🎂</h1>
    <p>Something special is waiting for you...</p>
    <button onclick="start()">Open</button>
  </div>
</div>

<script>
function start() {
  document.getElementById("music").play();
  document.getElementById("content").innerHTML = `
    <h1>Happy Birthday Nana ❤️</h1>
    <p>May this year be as beautiful as your smile ✨</p>
    <img src="BIRTHDAYPIC.jpeg">
  `;
}
</script>

</body>
</html>
